server:
  port: 8080

spring:
  application:
    name: aws-lab-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  aws:
    region: us-east-2
  s3:
    bucket: ${S3_BUCKET_NAME:awslab2026-bucket-test}