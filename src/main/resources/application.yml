server:
  port: 8080

spring:
  application:
    name: aws-lab-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect  # 추가
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
cloud:
  aws: 
    region:
      static: us-east-2
    stack:
      auto: false
    s3:
      bucket: ${S3_BUCKET_NAME}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always