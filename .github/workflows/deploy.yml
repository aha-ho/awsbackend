name: Deploy to Amazon EC2

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: aws-lab-app

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # JDK 설정 (Spring Boot 빌드용)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 빌드 권한 부여 및 빌드
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true

    - name: Build with Gradle
      run: ./gradlew bootJar || gradle bootJar

    # AWS 인증
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ECR 로그인
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    # Docker 이미지 빌드 및 ECR 푸시
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

# EC2에 접속하여 배포
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        # envs에 나열된 변수들만 script 내에서 사용할 수 있습니다.
        envs: SPRING_DATASOURCE_URL,SPRING_DATASOURCE_USERNAME,SPRING_DATASOURCE_PASSWORD,AWS_REGION,ECR_REGISTRY,S3_BUCKET_NAME
        script: |
          # ECR 로그인
          aws ecr get-login-password --region $AWS_REGION | sudo docker login --username AWS --password-stdin $ECR_REGISTRY
          
          # 기존 컨테이너 중지 및 삭제
          sudo docker stop aws-lab-app || true
          sudo docker rm aws-lab-app || true
          
          # 안 쓰는 이미지 정리 (용량 확보)
          sudo docker image prune -f
          
          # 새 이미지 Pull
          sudo docker pull $ECR_REGISTRY/aws-lab-app:latest
          
          # 컨테이너 실행 (환경변수 주입)
          sudo docker run -d --name aws-lab-app \
            -p 8080:8080 \
            -e SPRING_DATASOURCE_URL="$SPRING_DATASOURCE_URL" \
            -e SPRING_DATASOURCE_USERNAME="$SPRING_DATASOURCE_USERNAME" \
            -e SPRING_DATASOURCE_PASSWORD="$SPRING_DATASOURCE_PASSWORD" \
            -e S3_BUCKET_NAME="$S3_BUCKET_NAME" \
            $ECR_REGISTRY/aws-lab-app:latest
      env:
        SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
        SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
        SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        AWS_REGION: us-east-2
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}